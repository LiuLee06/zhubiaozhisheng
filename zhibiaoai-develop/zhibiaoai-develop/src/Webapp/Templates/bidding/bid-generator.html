<!DOCTYPE html>
<!--选择项目，生成标书-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标书生成 - 筑标智胜</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo h1 {
            margin: 0;
            font-size: 24px;
        }

        .logo p {
            margin: 5px 0 0 0;
            font-size: 14px;
            opacity: 0.8;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            font-size: 14px;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        .nav {
            background-color: #34495e;
            padding: 0 30px;
        }

        .nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .nav li {
            margin-right: 20px;
        }

        .nav a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 12px 15px;
            font-size: 14px;
        }

        .nav a:hover,
        .nav a.active {
            background-color: #2c3e50;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-header h2 {
            color: #2c3e50;
            margin: 0;
        }

        .section {
            background-color: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .section h3 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group select,
        .form-group input,
        .form-group textarea {
            width: 95%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        .btn-success {
            background-color: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background-color: #219653;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .project-card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .project-card.selected {
            border-color: #3498db;
            background-color: #f8f9fa;
        }

        .project-card h3 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 18px;
        }

        .project-info {
            margin: 15px 0;
        }

        .project-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .no-projects {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .preview-section {
            display: none;
        }

        .preview-content {
            background-color: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 20px;
            min-height: 300px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress {
            height: 100%;
            background-color: #3498db;
            width: 0%;
            transition: width 0.3s ease;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>筑标智胜</h1>
            <p>建筑行业智能标书生成系统</p>
        </div>
        <div class="user-info">
            <span>欢迎，{{ session.username }}</span>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="nav">
        <ul>
            <li><a href="{{ url_for('bidding.home') }}">首页</a></li>
            <li><a href="{{ url_for('bidding.qualifications') }}">公司资质管理</a></li>
            <li><a href="{{ url_for('bidding.projects') }}">项目管理</a></li>
            <li><a href="{{ url_for('bidding.bid_generator') }}" class="active">标书生成</a></li>
            <li><a href="{{ url_for('bidding.templates') }}">模板管理</a></li>
        </ul>
    </div>


    <div class="container">
        <div class="page-header">
            <h2>标书生成</h2>
        </div>

        <div class="section">
            <h3>选择项目</h3>
            <p>请选择一个项目来生成标书：</p>

            <div class="projects-list">
                <div class="projects-grid" id="projectsGrid">
                    <!-- 项目卡片将通过JavaScript动态添加 -->
                    <div class="no-projects" id="noProjectsMessage">
                        <p>暂无项目</p>
                        <p style="font-size: 14px; margin-top: 10px;">
                            请先到<a href="projects.html" style="color: #3498db; text-decoration: none;">项目管理</a>页面创建项目
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="section preview-section" id="previewSection">
            <h3>标书预览</h3>
            <div class="form-group">
                <label for="bidTitle">标书标题</label>
                <input type="text" id="bidTitle" name="bidTitle" placeholder="请输入标书标题">
            </div>

            <div class="form-group">
                <label for="bidTemplate">标书模板</label>
                <select id="bidTemplate" name="bidTemplate">
                    <option value="">请选择标书模板</option>
                    <option value="construction">施工标书模板</option>
                    <option value="design">设计标书模板</option>
                    <option value="supervision">监理标书模板</option>
                    <option value="survey">勘察标书模板</option>
                </select>
            </div>

            <div class="form-group">
                <label>标书预览</label>
                <div class="preview-content" id="previewContent">
                    <!-- 预览内容将通过JavaScript动态添加 -->
                </div>
            </div>

            <div class="form-actions">
                <button class="btn btn-success" onclick="generateBidDocument()">生成标书</button>
                <button class="btn btn-primary" onclick="editBidDocument()">编辑标书</button>
                <button class="btn btn-secondary" onclick="resetSelection()">重新选择</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 筑标智胜 版权所有</p>
    </div>

    <script>
        // 模拟项目数据（在实际应用中应从服务器获取）
        const projects = [
            {
                id: "XM1001",
                name: "阳光花园住宅项目",
                description: "新建住宅楼及配套设施建设",
                createDate: "2023-05-15"
            } // 为了演示目的，只保留一个项目实例
        ];

        let selectedProject = null;

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = '{{ url_for("auth.logout") }}';
            }
        }


        // 检查是否显示"暂无项目"提示
        function checkNoProjectsMessage() {
            const projectsGrid = document.getElementById('projectsGrid');
            const noProjectsMessage = document.getElementById('noProjectsMessage');
            const projectCards = projectsGrid.querySelectorAll('.project-card');

            if (projectCards.length === 0) {
                noProjectsMessage.style.display = 'block';
            } else {
                noProjectsMessage.style.display = 'none';
            }
        }

        // 选择项目
        function selectProject(projectId) {
            // 取消之前选中的项目
            const previouslySelected = document.querySelector('.project-card.selected');
            if (previouslySelected) {
                previouslySelected.classList.remove('selected');
            }

            // 选择新项目
            const selectedCard = document.querySelector(`.project-card[data-id="${projectId}"]`);
            if (selectedCard) {
                selectedCard.classList.add('selected');
                selectedProject = projects.find(project => project.id === projectId);

                // 显示预览区域
                document.getElementById('previewSection').style.display = 'block';

                // 更新预览内容
                updatePreview();
            }
        }

        // 更新预览内容
        function updatePreview() {
            if (!selectedProject) return;

            // 设置默认标书标题
            document.getElementById('bidTitle').value = `${selectedProject.name}标书`;

            // 生成预览内容
            const previewContent = `
标书标题：${selectedProject.name}标书

项目基本信息：
- 项目名称：${selectedProject.name}
- 项目编号：${selectedProject.id}
- 项目描述：${selectedProject.description}
- 创建时间：${selectedProject.createDate}

公司资质信息：
- 建筑工程施工总承包资质（壹级）
- 建筑设计甲级资质
- 工程监理甲级资质

投标方案：
（此处将根据项目类型和公司资质生成详细的投标方案）

施工组织设计：
（此处将生成详细的施工组织设计方案）

工期安排：
（此处将根据项目规模制定合理的工期安排）

报价清单：
（此处将生成详细的报价清单）

附件：
（此处将列出所有相关附件）
            `;

            document.getElementById('previewContent').textContent = previewContent;
        }

        // 生成标书
        async function generateBidDocument() {
            if (!selectedProject) {
                alert('请先选择一个项目');
                return;
            }

            const bidTitle = document.getElementById('bidTitle').value;
            const bidTemplate = document.getElementById('bidTemplate').value;

            if (!bidTitle) {
                alert('请输入标书标题');
                return;
            }

            if (!bidTemplate) {
                alert('请选择标书模板');
                return;
            }

            // 准备发送给后端的数据
            const bidData = {
                project_id: selectedProject.id,
                project_name: selectedProject.name,
                bid_title: bidTitle,
                template: bidTemplate,
                requirements: selectedProject.description || '根据项目需求生成标书',
                company_info: '建筑工程施工总承包资质（壹级）、建筑设计甲级资质、工程监理甲级资质',
                technical_requirements: '技术方案要求',
                implementation_plan: '实施计划要求',
                after_sales_service: '售后服务要求'
            };

            try {
                // 显示生成中提示
                console.log('正在生成标书，请稍候...');
                console.log('请求数据：', bidData);
                
                // 调用后端API（同步处理）
                console.log('发送请求到：/bidding/api/generate-bid');
                const response = await fetch('/bidding/api/generate-bid', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bidData)
                });

                console.log('响应状态：', response.status);
                console.log('响应对象：', response);

                const result = await response.json();
                console.log('响应结果：', result);

                if (result.success) {
                    alert(`标书生成成功！\n\n文件路径：${result.document_path}\n\n生成的章节：\n${Object.keys(result.result || {}).join('\n')}`);
                } else {
                    alert(`生成失败：${result.error || '未知错误'}`);
                }
            } catch (error) {
                console.error('生成标书出错：', error);
                alert(`生成标书时发生错误：${error.message}`);
            }
        }

        // 编辑标书
        function editBidDocument() {
            if (!selectedProject) {
                alert('请先选择一个项目');
                return;
            }

            const bidTitle = document.getElementById('bidTitle').value;
            const bidTemplate = document.getElementById('bidTemplate').value;

            if (!bidTitle) {
                alert('请输入标书标题');
                return;
            }

            if (!bidTemplate) {
                alert('请选择标书模板');
                return;
            }

            // 获取预览内容
            const previewContent = document.getElementById('previewContent').textContent;

            // 在实际应用中，这里会打开一个编辑器窗口或者跳转到编辑页面
            alert(`标书编辑功能已启动\n标题：${bidTitle}\n模板：${document.getElementById('bidTemplate').options[document.getElementById('bidTemplate').selectedIndex].text}\n\n您可以在此处编辑以下内容：\n\n${previewContent.substring(0, 200)}...`);
        }

        // 重新选择项目
        function resetSelection() {
            // 取消之前选中的项目
            const previouslySelected = document.querySelector('.project-card.selected');
            if (previouslySelected) {
                previouslySelected.classList.remove('selected');
            }

            selectedProject = null;

            // 隐藏预览区域
            document.getElementById('previewSection').style.display = 'none';
        }

        // 初始化项目列表
        function initProjects() {
            const projectsGrid = document.getElementById('projectsGrid');

            // 清空现有内容（除了提示信息）
            const noProjectsMessage = document.getElementById('noProjectsMessage');
            projectsGrid.innerHTML = '';
            projectsGrid.appendChild(noProjectsMessage);

            // 添加项目卡片
            projects.forEach(project => {
                const projectCard = document.createElement('div');
                projectCard.className = 'project-card';
                projectCard.dataset.id = project.id;
                projectCard.innerHTML = `
                    <h3>${project.name}</h3>
                    <div class="project-info">
                        <p><strong>项目编号：</strong>${project.id}</p>
                        <p><strong>项目描述：</strong>${project.description}</p>
                        <p><strong>创建时间：</strong>${project.createDate}</p>
                    </div>
                `;

                projectCard.addEventListener('click', () => {
                    selectProject(project.id);
                });

                projectsGrid.appendChild(projectCard);
            });

            // 检查是否显示"暂无项目"提示
            checkNoProjectsMessage();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initProjects();
        });
    </script>
</body>
</html>
