<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司资质管理 - 筑标智胜</title>
    <style>
        /* 全局样式重置与基础配置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Arial", "Microsoft YaHei", sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        /* 头部样式 */
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        .logo h1 {
            font-size: 24px;
            margin: 0;
        }
        .logo p {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 5px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-info span {
            font-size: 14px;
        }
        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .logout-btn:hover {
            background-color: #c0392b;
        }

        /* 导航栏样式 */
        .nav {
            background-color: #34495e;
            padding: 0 30px;
        }
        .nav ul {
            list-style: none;
            display: flex;
        }
        .nav li {
            margin-right: 20px;
        }
        .nav a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 12px 15px;
            font-size: 14px;
            transition: background 0.3s;
        }
        .nav a.active,
        .nav a:hover {
            background-color: #2c3e50;
        }

        /* 容器与页面头部样式 */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .page-header h2 {
            color: #2c3e50;
            margin: 0;
            font-size: 22px;
        }

        /* 按钮通用样式 */
        .upload-btn,
        .btn-primary {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .upload-btn:hover,
        .btn-primary:hover {
            background-color: #2980b9;
        }
        .btn-secondary {
            background-color: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn-secondary:hover {
            background-color: #7f8c8d;
        }
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .view-btn {
            background-color: #3498db;
            color: white;
        }
        .view-btn:hover {
            background-color: #2980b9;
        }
        .download-btn {
            background-color: #27ae60;
            color: white;
        }
        .download-btn:hover {
            background-color: #219a52;
        }
        .delete-btn {
            background-color: #e74c3c;
            color: white;
        }
        .delete-btn:hover {
            background-color: #c0392b;
        }

        /* 上传表单样式 */
        .upload-section {
            background-color: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .upload-section h3 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input,
        .form-group select {
            width: 95%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }
        .form-group input[type="file"] {
            padding: 8px;
            border: 1px dashed #ddd;
            background-color: #f9f9f9;
        }
        .form-group p {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* 资质卡片列表样式 */
        .qualifications-list h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .qualifications-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .qualification-card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            position: relative;
        }
        .qualification-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        .qualification-card.fade-out {
            opacity: 0;
            transform: translateX(100px);
        }
        .qualification-card h3 {
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
            word-break: break-all;
        }
        .qualification-info {
            margin: 15px 0;
        }
        .qualification-info p {
            margin: 8px 0;
            color: #666;
            font-size: 14px;
        }
        .qualification-info strong {
            color: #333;
        }
        .qualification-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* 状态标签 */
        .status-valid {
            color: #27ae60;
            font-weight: bold;
            font-size: 12px;
            padding: 2px 8px;
            background-color: #e8f5e8;
            border-radius: 12px;
            display: inline-block;
        }
        .status-expired {
            color: #e74c3c;
            font-weight: bold;
            font-size: 12px;
            padding: 2px 8px;
            background-color: #fde8e6;
            border-radius: 12px;
            display: inline-block;
        }

        /* 提示信息样式 */
        .loading,
        .error-message,
        .no-qualifications {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 14px;
        }
        .loading {
            color: #666;
            display: block;
        }
        .error-message {
            color: #e74c3c;
            display: none;
        }
        .no-qualifications {
            color: #666;
            display: none;
        }
        .no-qualifications p:last-child {
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* 动画效果 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 页脚样式 */
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
            margin-top: 50px;
            border-top: 1px solid #eee;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .user-info {
                width: 100%;
                justify-content: flex-end;
            }
            .nav ul {
                flex-wrap: wrap;
            }
            .nav li {
                margin-right: 0;
                width: 50%;
                text-align: center;
            }
            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .qualifications-grid {
                grid-template-columns: 1fr;
            }
            .form-group input,
            .form-group select {
                width: 100%;
            }
            .form-actions {
                flex-direction: column;
            }
            .qualification-actions {
                flex-direction: column;
            }
        }

        /* 模态框样式 */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 0;
            max-width: 90%;
            max-height: 80%;
            overflow: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: #f8f9fa;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #eee;
            text-align: right;
        }

        .modal-btn {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }

        .modal-btn-primary {
            background: #3498db;
        }

        .modal-btn-primary:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>
<!-- 头部区域 -->
<div class="header">
    <div class="logo">
        <h1>筑标智胜</h1>
        <p>建筑行业智能标书生成系统</p>
    </div>
    <div class="user-info">
        <span>欢迎，{{ session.username }}</span>
        <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
</div>

<!-- 导航栏 -->
<div class="nav">
    <ul>
        <li><a href="{{ url_for('bidding.home') }}">首页</a></li>
        <li><a href="{{ url_for('bidding.qualifications') }}" class="active">公司资质管理</a></li>
        <li><a href="{{ url_for('bidding.projects') }}">项目管理</a></li>
        <li><a href="{{ url_for('bidding.bid_generator') }}">标书生成</a></li>
        <li><a href="{{ url_for('bidding.templates') }}">模板管理</a></li>
    </ul>
</div>

<!-- 主内容区域 -->
<div class="container">
    <!-- 页面头部 -->
    <div class="page-header">
        <h2>公司资质管理</h2>
        <button class="upload-btn" id="uploadButton">+ 上传新资质</button>
    </div>

    <!-- 上传表单区域 -->
    <div class="upload-section" id="uploadSection">
        <h3>上传新资质文件</h3>
        <form id="uploadForm">
            <div class="form-group">
                <label for="qualificationName">资质名称</label>
                <input type="text" id="qualificationName" name="qualificationName"
                       placeholder="如：建筑工程施工总承包一级资质" required>
            </div>
            <div class="form-group">
                <label for="qualificationType">资质类型</label>
                <select id="qualificationType" name="qualificationType" required>
                    <option value="">请选择资质类型</option>
                    <option value="design">设计资质</option>
                    <option value="construction">施工资质</option>
                    <option value="survey">勘察资质</option>
                    <option value="supervision">监理资质</option>
                    <option value="other">其他资质</option>
                </select>
            </div>
            <div class="form-group">
                <label for="qualificationFile">资质文件</label>
                <input type="file" id="qualificationFile" name="qualificationFile"
                       accept=".pdf,.doc,.docx,.ppt,.pptx" required>
                <p>支持格式：PDF、Word（.doc/.docx）、PPT（.ppt/.pptx）</p>
            </div>
            <div class="form-group">
                <label for="expiryDate">有效期至</label>
                <input type="date" id="expiryDate" name="expiryDate" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">上传资质</button>
                <button type="button" class="btn btn-secondary" id="cancelButton">取消</button>
            </div>
        </form>
    </div>

    <!-- 资质列表区域 -->
    <div class="qualifications-list">
        <h3>已上传资质</h3>
        <div class="qualifications-grid" id="qualificationsGrid">
            <!-- 加载提示 -->
            <div class="loading" id="loadingIndicator">
                <p>正在加载资质数据...</p>
            </div>
            <!-- 错误提示 -->
            <div class="error-message" id="errorMessage">
                <p>加载失败，请刷新页面重试</p>
            </div>
            <!-- 无资质提示 -->
            <div class="no-qualifications" id="noQualificationsMessage">
                <p>暂无已上传的资质文件</p>
                <p>点击上方"上传新资质"按钮添加文件</p>
            </div>
            <!-- 资质卡片将通过JavaScript动态生成 -->
        </div>
    </div>
</div>

<!-- 页脚 -->
<div class="footer">
    <p>© 2024 筑标智胜 版权所有 | 建筑行业智能标书生成系统</p>
</div>

<!-- 功能脚本 -->
<script>
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', function() {
        initializeApp();
    });

    function initializeApp() {
        // 绑定事件监听器
        bindEventListeners();

        // 检查是否显示无数据提示
        checkNoQualificationsMessage();

        // 隐藏加载提示（模拟数据加载完成）
        setTimeout(() => {
            document.getElementById('loadingIndicator').style.display = 'none';
        }, 1000);
    }

    function bindEventListeners() {
        const uploadButton = document.getElementById('uploadButton');
        const cancelButton = document.getElementById('cancelButton');
        const uploadForm = document.getElementById('uploadForm');

        if (uploadButton) {
            uploadButton.addEventListener('click', toggleUploadForm);
        }

        if (cancelButton) {
            cancelButton.addEventListener('click', toggleUploadForm);
        }

        if (uploadForm) {
            uploadForm.addEventListener('submit', handleFormSubmit);
        }
    }

    function toggleUploadForm() {
        const uploadSection = document.getElementById('uploadSection');
        const uploadButton = document.getElementById('uploadButton');

        if (uploadSection.style.display === 'block') {
            uploadSection.style.display = 'none';
            uploadButton.textContent = '+ 上传新资质';
        } else {
            uploadSection.style.display = 'block';
            uploadButton.textContent = '− 取消上传';
            // 自动聚焦到第一个输入框
            document.getElementById('qualificationName').focus();
        }
    }

    function validateForm() {
        const name = document.getElementById('qualificationName').value.trim();
        const type = document.getElementById('qualificationType').value;
        const file = document.getElementById('qualificationFile').value;
        const expiryDate = document.getElementById('expiryDate').value;

        if (!name) {
            alert('请输入资质名称');
            return false;
        }

        if (!type) {
            alert('请选择资质类型');
            return false;
        }

        if (!file) {
            alert('请选择资质文件');
            return false;
        }

        if (!expiryDate) {
            alert('请选择有效期');
            return false;
        }

        return true;
    }

    function handleFormSubmit(event) {
        event.preventDefault();

        if (!validateForm()) {
            return;
        }

        // 模拟上传成功
        alert('资质上传成功！');
        toggleUploadForm();
        resetForm();

        // 模拟添加新资质卡片
        const newQualification = {
            id: Date.now().toString(),
            name: document.getElementById('qualificationName').value,
            type: document.getElementById('qualificationType').options[document.getElementById('qualificationType').selectedIndex].text,
            expiryDate: document.getElementById('expiryDate').value,
            uploadDate: new Date().toLocaleDateString(),
            status: 'valid'
        };

        createQualificationCard(newQualification);
        checkNoQualificationsMessage();
    }

    function resetForm() {
        document.getElementById('uploadForm').reset();
    }

    function checkNoQualificationsMessage() {
        const grid = document.getElementById('qualificationsGrid');
        const noQualificationsMessage = document.getElementById('noQualificationsMessage');

        // 检查是否有资质卡片（排除提示元素）
        const hasCards = Array.from(grid.children).some(child => {
            return child.classList.contains('qualification-card');
        });

        if (hasCards) {
            noQualificationsMessage.style.display = 'none';
        } else {
            noQualificationsMessage.style.display = 'block';
        }
    }

    // 创建资质卡片
    function createQualificationCard(qualification) {
        const grid = document.getElementById('qualificationsGrid');

        // 隐藏无数据提示
        document.getElementById('noQualificationsMessage').style.display = 'none';

        const card = document.createElement('div');
        card.className = 'qualification-card';
        card.dataset.id = qualification.id;

        // 格式化日期
        const formattedExpiryDate = formatDate(qualification.expiryDate);

        // 状态判断
        const status = qualification.status === 'valid' ?
            '<span class="status-valid">有效</span>' :
            '<span class="status-expired">已过期</span>';

        card.innerHTML = `
            <h3>${qualification.name}</h3>
            <div class="qualification-info">
                <p><strong>类型：</strong>${qualification.type}</p>
                <p><strong>编号：</strong>${qualification.id}</p>
                <p><strong>有效期至：</strong>${formattedExpiryDate}</p>
                <p><strong>上传时间：</strong>${qualification.uploadDate}</p>
                <p><strong>状态：</strong>${status}</p>
            </div>
            <div class="qualification-actions">
                <button class="action-btn view-btn" data-id="${qualification.id}" data-name="${qualification.name}">查看详情</button>
                <button class="action-btn download-btn">下载文件</button>
                <button class="action-btn delete-btn" data-id="${qualification.id}">删除</button>
            </div>
        `;

        // 添加到网格的开头
        grid.insertBefore(card, grid.firstChild);

        // 绑定事件
        const viewBtn = card.querySelector('.view-btn');
        const deleteBtn = card.querySelector('.delete-btn');

        viewBtn.addEventListener('click', function() {
            const id = this.dataset.id;
            const name = this.dataset.name;
            showQualificationDetails(name, qualification.type, id, formattedExpiryDate, qualification.uploadDate, qualification.status);
        });

        deleteBtn.addEventListener('click', function() {
            const id = this.dataset.id;
            deleteQualification(id);
        });
    }

    // 查看资质详情
    function showQualificationDetails(name, type, id, expiryDate, uploadDate, status) {
        const statusText = status === 'valid' ? '有效' : '已过期';

        const modalHtml = `
            <div style="padding: 20px; max-width: 500px;">
                <h3 style="color: #2c3e50; margin-top: 0;">资质详情</h3>
                <p><strong>资质名称：</strong>${name}</p>
                <p><strong>资质类型：</strong>${type}</p>
                <p><strong>资质编号：</strong>${id}</p>
                <p><strong>有效期至：</strong>${expiryDate}</p>
                <p><strong>上传时间：</strong>${uploadDate}</p>
                <p><strong>状态：</strong>${statusText}</p>
                <div style="margin-top: 20px; text-align: center;">
                    <button onclick="viewParsedResult('${id}', '${name}')"
                            style="background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">
                        查看解析结果
                    </button>
                </div>
            </div>
        `;

        // 使用自定义模态框替代 alert
        showCustomModal(modalHtml);
    }

    // 查看解析结果 - 跳转到解析页面
    function viewParsedResult(qualificationId, qualificationName) {
        // 实际项目中应该跳转到真实的解析结果页面
        // 这里使用模拟的URL，你需要根据实际路由调整
        const parsedUrl = `{{ url_for('bidding.view_parsed_result') }}?id=${qualificationId}&name=${encodeURIComponent(qualificationName)}`;
        window.location.href = parsedUrl;

        // 如果是本地演示，可以使用下面的模拟方式
        // alert(`即将查看 ${qualificationName} 的解析结果\n资质ID: ${qualificationId}`);
        // 在实际项目中，这里应该是跳转到解析页面的代码
    }

    // 添加自定义模态框函数
    function showCustomModal(htmlContent) {
        // 移除现有的模态框
        const existingModal = document.getElementById('customModal');
        if (existingModal) {
            existingModal.remove();
        }

        const modal = document.createElement('div');
        modal.id = 'customModal';
        modal.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        `;

        modal.innerHTML = `
            <div style="background: white; border-radius: 8px; padding: 0; max-width: 90%; max-height: 80%; overflow: auto;">
                <div style="padding: 20px; border-bottom: 1px solid #eee;">
                    <h3 style="margin: 0; color: #2c3e50;">资质详情</h3>
                </div>
                <div style="padding: 20px;">
                    ${htmlContent}
                </div>
                <div style="padding: 15px 20px; border-top: 1px solid #eee; text-align: right;">
                    <button onclick="closeModal()" style="background: #95a5a6; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
                        关闭
                    </button>
                </div>
            </div>
        `;

        document.body.appendChild(modal);
    }

    function closeModal() {
        const modal = document.getElementById('customModal');
        if (modal) {
            modal.remove();
        }
    }

    // 删除资质
    function deleteQualification(id) {
        if (!confirm('确定要删除这个资质文件吗？此操作不可恢复。')) {
            return;
        }

        const card = document.querySelector(`.qualification-card[data-id="${id}"]`);
        if (card) {
            // 添加删除动画
            card.classList.add('fade-out');

            // 动画完成后移除元素
            setTimeout(() => {
                card.remove();
                checkNoQualificationsMessage();
            }, 300);
        }
    }

    function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        });
    }
