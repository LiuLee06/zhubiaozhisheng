<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模板管理 - 筑标智胜</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo h1 {
            margin: 0;
            font-size: 24px;
        }

        .logo p {
            margin: 5px 0 0 0;
            font-size: 14px;
            opacity: 0.8;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-info span {
            font-size: 14px;
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }

        .nav {
            background-color: #34495e;
            padding: 0 30px;
        }

        .nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
        }

        .nav li {
            margin-right: 20px;
        }

        .nav a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 12px 15px;
            font-size: 14px;
        }

        .nav a:hover,
        .nav a.active {
            background-color: #2c3e50;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-header h2 {
            color: #2c3e50;
            margin: 0;
        }

        .upload-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .upload-btn:hover {
            background-color: #2980b9;
        }

        .upload-section {
            background-color: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: none;
        }

        .upload-section h3 {
            color: #2c3e50;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input, 
        .form-group select,
        .form-group textarea {
            width: 95%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #7f8c8d;
        }

        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .template-card {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .template-card h3 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 18px;
        }

        .template-info {
            margin: 15px 0;
        }

        .template-info p {
            margin: 5px 0;
            color: #666;
            font-size: 14px;
        }

        .template-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .view-btn {
            background-color: #3498db;
            color: white;
        }

        .view-btn:hover {
            background-color: #2980b9;
        }

        .edit-btn {
            background-color: #f39c12;
            color: white;
        }

        .edit-btn:hover {
            background-color: #d35400;
        }

        .delete-btn {
            background-color: #e74c3c;
            color: white;
        }

        .delete-btn:hover {
            background-color: #c0392b;
        }

        .no-templates {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>筑标智胜</h1>
            <p>建筑行业智能标书生成系统</p>
        </div>
        <div class="user-info">
            <span>欢迎，管理员</span>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="nav">
        <ul>
            <li><a href="{{ url_for('bidding.home') }}">首页</a></li>
            <li><a href="{{ url_for('bidding.qualifications') }}">公司资质管理</a></li>
            <li><a href="{{ url_for('bidding.projects') }}">项目管理</a></li>
            <li><a href="{{ url_for('bidding.bid_generator') }}">标书生成</a></li>
            <li><a href="{{ url_for('bidding.templates') }}" class="active">模板管理</a></li>
        </ul>
    </div>

    <div class="container">
        <div class="page-header">
            <h2>模板管理</h2>
            <button class="upload-btn" onclick="toggleUploadForm()">+ 上传新模板</button>
        </div>

        <div class="upload-section" id="uploadSection">
            <h3>上传新模板</h3>
            <form id="uploadForm">
                <div class="form-group">
                    <label for="templateName">模板名称</label>
                    <input type="text" id="templateName" name="templateName" placeholder="请输入模板名称" required>
                </div>

                <div class="form-group">
                    <label for="templateType">模板类型</label>
                    <select id="templateType" name="templateType" required>
                        <option value="">请选择模板类型</option>
                        <option value="construction">施工标书模板</option>
                        <option value="design">设计标书模板</option>
                        <option value="supervision">监理标书模板</option>
                        <option value="survey">勘察标书模板</option>
                        <option value="other">其他模板</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="templateDescription">模板描述</label>
                    <textarea id="templateDescription" name="templateDescription" placeholder="请输入模板描述" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="templateFile">模板文件</label>
                    <input type="file" id="templateFile" name="templateFile" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">上传模板</button>
                    <button type="button" class="btn btn-secondary" onclick="toggleUploadForm()">取消</button>
                </div>
            </form>
        </div>

        <div class="templates-list">
            <h3>已上传模板</h3>
            <div class="templates-grid" id="templatesGrid">
                <!-- 模板卡片将通过JavaScript动态添加 -->
                <div class="no-templates" id="noTemplatesMessage">
                    <p>暂无模板文件</p>
                    <p style="font-size: 14px; margin-top: 10px;">请点击上方"上传新模板"按钮添加模板文件</p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>© 筑标智胜 版权所有</p>
    </div>

    <script>
        // 模拟模板数据（在实际应用中应从服务器获取）
        const templates = [
            {
                id: "MB1001",
                name: "施工标书模板",
                type: "construction",
                description: "适用于建筑施工项目的标书模板",
                uploadDate: "2023-05-15",
                fileName: "construction_template.docx"
            },
            {
                id: "MB1002",
                name: "设计标书模板",
                type: "design",
                description: "适用于建筑设计项目的标书模板",
                uploadDate: "2023-05-16",
                fileName: "design_template.docx"
            }
        ];

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                alert('您已成功退出登录');
                window.location.href = 'login.html';
            }
        }

        function toggleUploadForm() {
            const uploadSection = document.getElementById('uploadSection');
            if (uploadSection.style.display === 'block') {
                uploadSection.style.display = 'none';
            } else {
                uploadSection.style.display = 'block';
            }
        }

        // 生成模板ID的函数
        function generateTemplateId() {
            const prefix = "MB";
            const randomNumber = Math.floor(1000 + Math.random() * 9000);
            return prefix + randomNumber;
        }

        // 获取当前日期的函数
        function getCurrentDate() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 根据类型值获取类型名称
        function getTemplateTypeName(typeValue) {
            const types = {
                'construction': '施工标书模板',
                'design': '设计标书模板',
                'supervision': '监理标书模板',
                'survey': '勘察标书模板',
                'other': '其他模板'
            };
            return types[typeValue] || '未知类型';
        }

        // 检查是否显示"暂无模板"提示
        function checkNoTemplatesMessage() {
            const templatesGrid = document.getElementById('templatesGrid');
            const noTemplatesMessage = document.getElementById('noTemplatesMessage');
            const templateCards = templatesGrid.querySelectorAll('.template-card');
            
            if (templateCards.length === 0) {
                noTemplatesMessage.style.display = 'block';
            } else {
                noTemplatesMessage.style.display = 'none';
            }
        }

        // 显示模板详情
        function showTemplateDetails(templateName, templateType, templateId, templateDescription, uploadDate, fileName) {
            alert(`模板名称：${templateName}\n模板类型：${templateType}\n模板编号：${templateId}\n模板描述：${templateDescription}\n上传时间：${uploadDate}\n文件名：${fileName}`);
            // 在实际应用中，这里可以打开一个模态框显示详细信息或者跳转到详情页
        }

        // 编辑模板
        function editTemplate(templateId) {
            alert(`编辑模板功能（模板ID: ${templateId}）\n在实际应用中，这里会打开编辑界面`);
            // 在实际应用中，这里会打开编辑界面
        }

        // 删除模板
        function deleteTemplate(templateId, templateName) {
            if (confirm(`确定要删除模板"${templateName}"吗？`)) {
                // 在实际应用中，这里会发送请求到服务器删除模板
                alert(`模板"${templateName}"已删除`);
                
                // 从页面中移除模板卡片
                const templateCard = document.querySelector(`.template-card[data-id="${templateId}"]`);
                if (templateCard) {
                    templateCard.remove();
                    checkNoTemplatesMessage();
                }
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // 获取表单数据
            const templateName = document.getElementById('templateName').value;
            const templateType = document.getElementById('templateType').value;
            const templateDescription = document.getElementById('templateDescription').value;
            const templateFile = document.getElementById('templateFile').files[0];
            
            // 创建新的模板卡片
            const newCard = document.createElement('div');
            newCard.className = 'template-card';
            newCard.dataset.id = generateTemplateId(); // 生成模板ID
            
            // 获取当前日期作为上传时间
            const uploadDate = getCurrentDate();
            
            // 获取文件名
            const fileName = templateFile ? templateFile.name : '未命名文件';
            
            // 填充卡片内容
            newCard.innerHTML = `
                <h3>${templateName}</h3>
                <div class="template-info">
                    <p><strong>模板类型：</strong>${getTemplateTypeName(templateType)}</p>
                    <p><strong>模板编号：</strong>${newCard.dataset.id}</p>
                    <p><strong>模板描述：</strong>${templateDescription || '无描述'}</p>
                    <p><strong>上传时间：</strong>${uploadDate}</p>
                    <p><strong>文件名：</strong>${fileName}</p>
                </div>
                <div class="template-actions">
                    <button class="action-btn view-btn" onclick="showTemplateDetails('${templateName}', '${getTemplateTypeName(templateType)}', '${newCard.dataset.id}', '${templateDescription || '无描述'}', '${uploadDate}', '${fileName}')">查看</button>
                    <button class="action-btn edit-btn" onclick="editTemplate('${newCard.dataset.id}')">编辑</button>
                    <button class="action-btn delete-btn" onclick="deleteTemplate('${newCard.dataset.id}', '${templateName}')">删除</button>
                </div>
            `;
            
            // 添加到模板列表中（在"暂无模板"提示之前）
            const noTemplatesMessage = document.getElementById('noTemplatesMessage');
            noTemplatesMessage.parentNode.insertBefore(newCard, noTemplatesMessage);
            
            // 隐藏"暂无模板"提示
            checkNoTemplatesMessage();
            
            alert('模板文件上传成功！');
            
            // 隐藏上传表单
            toggleUploadForm();
            
            // 重置表单
            this.reset();
        });
        
        // 页面加载完成后初始化模板列表
        document.addEventListener('DOMContentLoaded', function() {
            const templatesGrid = document.getElementById('templatesGrid');
            const noTemplatesMessage = document.getElementById('noTemplatesMessage');
            
            // 清空模板网格（除了提示信息）
            templatesGrid.innerHTML = '';
            templatesGrid.appendChild(noTemplatesMessage);
            
            // 添加现有模板卡片
            templates.forEach(template => {
                const templateCard = document.createElement('div');
                templateCard.className = 'template-card';
                templateCard.dataset.id = template.id;
                
                templateCard.innerHTML = `
                    <h3>${template.name}</h3>
                    <div class="template-info">
                        <p><strong>模板类型：</strong>${getTemplateTypeName(template.type)}</p>
                        <p><strong>模板编号：</strong>${template.id}</p>
                        <p><strong>模板描述：</strong>${template.description}</p>
                        <p><strong>上传时间：</strong>${template.uploadDate}</p>
                        <p><strong>文件名：</strong>${template.fileName}</p>
                    </div>
                    <div class="template-actions">
                        <button class="action-btn view-btn" onclick="showTemplateDetails('${template.name}', '${getTemplateTypeName(template.type)}', '${template.id}', '${template.description}', '${template.uploadDate}', '${template.fileName}')">查看</button>
                        <button class="action-btn edit-btn" onclick="editTemplate('${template.id}')">编辑</button>
                        <button class="action-btn delete-btn" onclick="deleteTemplate('${template.id}', '${template.name}')">删除</button>
                    </div>
                `;
                
                templatesGrid.insertBefore(templateCard, noTemplatesMessage);
            });
            
            // 检查是否显示"暂无模板"提示
            checkNoTemplatesMessage();
        });
    </script>
</body>
</html>
